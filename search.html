<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חיפוש | גו לונדון</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: #0a0a1a; color: #e2e8f0; direction: rtl; line-height: 1.7; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    .navbar {
      background: rgba(10,10,26,0.95); border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 24px; height: 64px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .logo { direction: ltr; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-img { height: 44px; width: auto; object-fit: contain; mix-blend-mode: screen; }
    .logo-text-fallback { display: none; align-items: baseline; gap: 2px; }
    .logo-go { font-size: 22px; font-weight: 900; color: #DC2626; }
    .logo-london { font-size: 22px; font-weight: 900; color: #fff; }
    .logo-slogan { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); direction: rtl; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.15); padding-right: 10px; }
    .back-btn {
      display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.6);
      font-size: 14px; font-weight: 600; padding: 8px 16px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s;
    }
    .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); text-decoration: none; }

    .search-hero {
      background: linear-gradient(135deg, #1a1040 0%, #2d1b69 100%);
      padding: 50px 24px 40px; text-align: center;
    }
    .search-hero h1 { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 20px; }
    .search-form { max-width: 560px; margin: 0 auto; display: flex; gap: 10px; }
    .search-form input {
      flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08); color: #fff; font-family: 'Heebo', sans-serif; font-size: 15px;
    }
    .search-form input::placeholder { color: rgba(255,255,255,0.4); }
    .search-form input:focus { outline: none; border-color: #7C3AED; }
    .search-form button {
      padding: 14px 22px; border-radius: 12px; border: none; background: #DC2626; color: #fff;
      font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .search-form button:hover { background: #B91C1C; }

    .results-wrap { max-width: 780px; margin: 0 auto; padding: 40px 24px 60px; }
    .results-count { color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 24px; }
    .result-card {
      display: flex; gap: 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 18px; margin-bottom: 16px; transition: all 0.2s;
    }
    .result-card:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }
    .result-img { width: 96px; height: 96px; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .result-img img { width: 100%; height: 100%; object-fit: cover; }
    .result-body { flex: 1; min-width: 0; }
    .result-cat { font-size: 11px; font-weight: 700; color: #c4b5fd; margin-bottom: 4px; display: block; }
    .result-title { font-size: 17px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .result-snippet { font-size: 13.5px; color: rgba(255,255,255,0.55); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .result-snippet mark { background: rgba(220,38,38,0.35); color: #fff; border-radius: 3px; padding: 0 2px; }

    .empty-state { text-align: center; padding: 60px 0; color: rgba(255,255,255,0.35); }
    .empty-state i { font-size: 40px; display: block; margin-bottom: 14px; opacity: 0.4; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="גו לונדון" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
    <div class="logo-text-fallback"><span class="logo-go">GO</span><span class="logo-london">LONDON</span></div>
    <span class="logo-slogan">המדריך הישראלי ללונדון</span>
  </a>
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> חזרה לדף הבית</a>
</nav>

<div class="search-hero">
  <h1>🔍 חפשו כל נושא באתר</h1>
  <form class="search-form" id="searchForm">
    <input type="text" id="searchInput" placeholder="לדוגמה: פאבים, כרטיס אויסטר, פסטיבל הקולנוע..." autocomplete="off" />
    <button type="submit">חפש</button>
  </form>
</div>

<div class="results-wrap">
  <div class="results-count" id="resultsCount"></div>
  <div id="resultsList"></div>
</div>

<script>
const CATEGORY_EMOJI = {
  'תכנון הטיול': '✈️', 'אטרקציות': '🎡', 'תחבורה': '🚇', 'לינה': '🏨',
  'אוכל': '🍔', 'שופינג': '🛍️', 'תרבות': '🎭', 'כדורגל': '⚽',
  'מלוכה': '👑', 'סוגי מטיילים': '👨‍👩‍👧‍👦', 'אירועים': '🎉', 'מסלולים': '🗺️'
};

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return escHtml(text);
  const esc = escHtml(text);
  const escQ = escHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc.replace(new RegExp('(' + escQ + ')', 'gi'), '<mark>$1</mark>');
}

function snippetAround(text, q) {
  const plain = text || '';
  const idx = plain.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return plain.slice(0, 140);
  const start = Math.max(0, idx - 60);
  return (start > 0 ? '… ' : '') + plain.slice(start, start + 160);
}

async function runSearch(q) {
  const list = document.getElementById('resultsList');
  const count = document.getElementById('resultsCount');
  list.innerHTML = '';
  count.textContent = '';
  if (!q || !q.trim()) return;

  let posts = [];
  try {
    const res = await fetch('posts.json?v=' + Date.now());
    posts = await res.json();
  } catch {}

  const qLower = q.trim().toLowerCase();
  const matches = posts.filter(p => {
    const text = p.title + ' ' + (p.desc || p.content || '') + ' ' + (p.category || '');
    return text.toLowerCase().includes(qLower);
  });

  count.textContent = matches.length ? `נמצאו ${matches.length} תוצאות` : '';

  if (!matches.length) {
    list.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-search"></i>
        <p>לא נמצאו תוצאות עבור "${escHtml(q)}"</p>
      </div>`;
    return;
  }

  list.innerHTML = matches.map(p => {
    const text = p.desc || p.content || '';
    const emoji = CATEGORY_EMOJI[p.category] || '📰';
    const img = p.image && !p.image.startsWith('http')
      ? `<img src="${escHtml(p.image)}" alt="${escHtml(p.title)}" onerror="this.parentElement.innerHTML='${emoji}'" />`
      : emoji;
    return `
    <a class="result-card" href="category.html?cat=${encodeURIComponent(p.category)}#post-${p.id}">
      <div class="result-img">${img}</div>
      <div class="result-body">
        <span class="result-cat">${escHtml(p.category)}</span>
        <div class="result-title">${highlight(p.title, q)}</div>
        <div class="result-snippet">${highlight(snippetAround(text, q), q)}</div>
      </div>
    </a>`;
  }).join('');
}

const params = new URLSearchParams(window.location.search);
const initialQ = params.get('q') || '';
document.getElementById('searchInput').value = initialQ;
runSearch(initialQ);

document.getElementById('searchForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const q = document.getElementById('searchInput').value;
  const url = new URL(window.location.href);
  url.searchParams.set('q', q);
  window.history.replaceState({}, '', url);
  runSearch(q);
});
</script>

</body>
</html>
